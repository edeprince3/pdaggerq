name: CI

# Build pdaggerq and run its test suite on every push to this branch / master and
# every PR. Two groups:
#   * test/  -- the upstream reference-output + numerical codegen tests
#       - test/pq_test.py        runs examples/*.py, diffs strings vs reference_outputs/*.ref
#       - test/numerical_test.py runs pq_graph/tests/*_codegen.py, executes it, checks numbers
#   * pdaggerq/  -- the generated-model library and its consumers
#       - pdaggerq/models_test.py   correctness of the models.py library: RDM<->energy
#                                   identity, Lambda consistency, single-proton reduction,
#                                   opt-level safety, orbital gradients/Hessians, ...
#       - pdaggerq/einsums_test.py  einsums dispatch/lowering

on:
  push:
    branches: [ feat-neo-spin-tracing, master ]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build & test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake g++

      - name: Build & install pdaggerq
        # setup.py drives CMake (which FetchContent-clones pybind11) with the
        # default Make generator; parallelise the compile across all cores.
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL="$(nproc)"
          python -m pip install --verbose .

      - name: Install test dependencies
        # pytest-forked runs each test in its own process -- required for
        # models_test.py, which cannot run all cases in one process (a pq_graph
        # cross-call state leak trips one case mid-suite; forking gives each a
        # fresh interpreter).
        run: python -m pip install pytest pytest-forked numpy

      # All test steps run from a NEUTRAL directory: `python -m pytest` puts the
      # CWD on sys.path[0], and from the repo root that shadows the installed,
      # compiled pdaggerq with the ./pdaggerq source tree (no built _pdaggerq
      # extension -> ImportError). The tests locate their data via __file__, so
      # absolute paths work from anywhere.

      - name: Reference & numerical codegen tests (test/)
        working-directory: ${{ runner.temp }}
        run: |
          python -m pytest -v \
            "$GITHUB_WORKSPACE/test/pq_test.py" \
            "$GITHUB_WORKSPACE/test/numerical_test.py"

      - name: Generated-model library tests (pdaggerq/)
        working-directory: ${{ runner.temp }}
        # --pyargs: these test modules live INSIDE the pdaggerq package, so collecting
        # them by source path imports the source-tree package (whose __init__ needs the
        # built _pdaggerq extension that only exists in site-packages) and fails with
        # ModuleNotFoundError. --pyargs collects the installed copies instead, which
        # pip install . built from this very checkout.
        run: |
          python -m pytest -v --forked --pyargs \
            pdaggerq.models_test pdaggerq.einsums_test

      # NOTE: pdaggerq/algebra_test.py and pdaggerq/parser_test.py are excluded --
      # they are stale (import T1amps, removed from pdaggerq/algebra.py) and fail
      # at collection. Re-add once fixed.
